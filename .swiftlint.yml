included:
  - Sources
  - Tests

excluded:
  - .build

# Rules configuration
line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 2000
  error: 3000

type_body_length:
  warning: 500
  error: 800

function_body_length:
  warning: 100
  error: 200

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60
  excluded:
    - id

nesting:
  type_level: 3
  function_level: 3

# Enabled opt-in rules
opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Disabled rules
disabled_rules:
  - trailing_comma
  - todo
  - opening_brace
